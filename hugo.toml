baseURL = "https://yarden.cn"
languageCode = "zh-CN"
title = "Yarden Zhang"

disableKinds = ["taxonomy", "term"]
enableRobotsTXT = true

[outputs]
  home = ["HTML"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[params]
  author = "Yarden Zhang"
  description = "叶定轩的个人主页，展示研究、发表成果和联系方式。"
  github = ""
  twitter = ""
  linkedin = ""
  instagram = ""
  email = "wineshe@qq.com"
  googlescholar = "https://"
  avatar = "/images/android-chrome-512x512.jpg"
  bio = "个人主页"
  location = "北京，中国"
  repository = "wineshe/mojia.github.io"
  google_scholar_stats_use_cdn = true

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "monthly"
  filename = "sitemap.xml"
  priority = 0.5

[frontmatter]
  date = [":filename", "date"]

[permalinks]
  blog = "/blog/:title/"
