<button id="back-to-top" title="Back to top" aria-label="Back to top">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
</button>

<style>
#back-to-top {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 100;
  width: 40px;
  height: 40px;
  border: none;
  border-radius: 50%;
  background: linear-gradient(135deg, #012F63 0%, #1a4f8a 100%);
  color: #fff;
  cursor: pointer;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.25s ease, transform 0.25s ease, box-shadow 0.2s;
  box-shadow: 0 2px 8px rgba(1,47,99,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  -webkit-font-smoothing: antialiased;
}
#back-to-top.is-visible {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
#back-to-top:hover {
  background: #FE667B;
  box-shadow: 0 4px 14px rgba(254,102,123,0.3);
  transform: translateY(-2px);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var btn = document.getElementById('back-to-top');
  if (!btn) return;
  var toggle = function() { btn.classList.toggle('is-visible', window.scrollY > 300); };
  window.addEventListener('scroll', toggle, {passive: true});
  toggle();
  btn.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });
});
</script>
