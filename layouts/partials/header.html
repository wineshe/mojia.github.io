    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button class="hidden" aria-label="Toggle navigation menu"><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="/#about-me" target="_self">Homepage</a>
          </li>

          <li class="masthead__menu-item"><a class="menu-link-bold" href="/#publications" target="_self"><strong>publications</strong></a></li>
          <li class="masthead__menu-item"><a class="menu-link-bold" href="/#open-source" target="_self"><strong>Open Source</strong></a></li>

      </nav>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.masthead__menu-item a[href^="/#"]').forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      var id = this.getAttribute('href').replace(/^\/?#/, '');
      if (window.location.pathname !== '/') {
        window.location.href = '/#' + id;
        return;
      }
      var target = document.getElementById(id);
      if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  });
});
</script>
