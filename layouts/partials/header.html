<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button class="hidden" aria-label="Toggle navigation menu"><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="/" target="_self">首页</a>
          </li>

          <li class="masthead__menu-item nav-section"><a class="menu-link-bold" href="/#publications" target="_self"><strong>论文发表</strong></a></li>
          <li class="masthead__menu-item nav-section"><a class="menu-link-bold" href="/#educations" target="_self"><strong>教育经历</strong></a></li>
          <li class="masthead__menu-item nav-section"><a class="menu-link-bold" href="/#internships" target="_self"><strong>实习经历</strong></a></li>
          <li class="masthead__menu-item nav-section"><a class="menu-link-bold" href="/#open-source" target="_self"><strong>开源项目</strong></a></li>
          <li class="masthead__menu-item"><a class="menu-link-bold" href="/#blogs" target="_self"><strong>博客</strong></a></li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('.masthead__menu-item a[href^="/#"]').forEach(function(a) {
    a.addEventListener('click', function(e) {
      e.preventDefault();
      var id = this.getAttribute('href').replace(/^\/?#/, '');
      if (window.location.pathname !== '/') {
        window.location.href = '/#' + id;
        return;
      }
      var target = document.getElementById(id);
      if (target) {
        var offset = 60;
        var top = target.getBoundingClientRect().top + window.pageYOffset - offset;
        window.scrollTo({ top: top, behavior: 'smooth' });
      }
    });
  });
});
</script>
